{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-8 col-xl-7">
        <div class="card page-card rounded-4">
            <div class="card-body p-4 p-md-5">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <p class="text-uppercase text-muted fw-semibold mb-1">Tareas</p>
                        <h1 class="h3 mb-0">Editar tarea</h1>
                    </div>
                    <a class="btn btn-outline-secondary" href="{{ url_for('bp_tarea.index') }}">Volver</a>
                </div>

                <form action="{{ url_for('bp_tarea.edit', id=tarea.id) }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label" for="descripcion">Descripción</label>
                        <input class="form-control form-control-lg" type="text" id="descripcion" name="descripcion" value="{{ descripcion or tarea.descripcion }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="miembro_id">Miembro</label>
                        <select class="form-select form-select-lg" id="miembro_id" name="miembro_id" required>
                            <option value="">Selecciona un miembro</option>
                            {% for item in miembros %}
                                <option value="{{ item.id }}" {% if (miembro_id or tarea.miembro_id) == item.id %}selected{% endif %}>{{ item.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox" id="completado" name="completado" {% if completado or tarea.completado %}checked{% endif %}>
                        <label class="form-check-label" for="completado">Marcar como completada</label>
                    </div>
                    {% if not miembros %}
                    <div class="alert alert-warning">
                        Primero debes crear miembros para poder registrar tareas.
                    </div>
                    {% endif %}
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary btn-lg" type="submit" {% if not miembros %}disabled{% endif %}>Actualizar</button>
                        <a class="btn btn-light btn-lg" href="{{ url_for('bp_tarea.index') }}">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
