{% extends "base.html" %}

{% block content%}
<h1>Listado de tareas</h1>
<a href="{{ url_for('bp_tarea.create') }}">Nueva tarea </a>

<ul>
    {% for item in tareas %}
    <li>Tarea: {{ item.descripcion}} Completado: {{ item.completado }}</li>
    {% else %}
    <li>No hay tareas</li>
    {% endfor %}
</ul>

{% endblock %}
