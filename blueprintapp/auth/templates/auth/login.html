{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-6 col-xl-5">
        <div class="card page-card rounded-4">
            <div class="card-body p-4 p-md-5">
                <div class="mb-4">
                    <p class="text-uppercase text-muted fw-semibold mb-1">Acceso</p>
                    <h1 class="h3 mb-0">Iniciar sesión</h1>
                </div>

                <form action="{{ url_for('auth.login') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label" for="username">Usuario</label>
                        <input class="form-control form-control-lg" type="text" id="username" name="username" placeholder="Tu usuario" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label" for="password">Contraseña</label>
                        <input class="form-control form-control-lg" type="password" id="password" name="password" placeholder="Tu contraseña" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button class="btn btn-primary btn-lg" type="submit">Ingresar</button>
                        <a class="btn btn-light btn-lg" href="{{ url_for('auth.register') }}">Crear cuenta</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
