{% extends "base.html" %}

{% block content%}
<div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
    <div>
        <p class="text-uppercase text-muted fw-semibold mb-1">Miembros</p>
        <h1 class="h3 mb-0">Listado de miembros</h1>
    </div>
    <a class="btn btn-primary" href="{{ url_for('bp_miembro.create') }}">Nuevo miembro</a>
</div>

<div class="card page-card rounded-4">
    <div class="table-responsive">
        <table class="table align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th>Nombre</th>
                    <th>Correo</th>
                    <th class="text-end">Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for item in miembros %}
                <tr>
                    <td class="fw-semibold">{{ item.nombre }}</td>
                    <td>{{ item.email }}</td>
                    <td>
                        <div class="d-flex justify-content-end gap-2">
                            <a class="btn btn-outline-primary btn-sm" href="{{ url_for('bp_miembro.edit', id=item.id) }}">Editar</a>
                            <form action="{{ url_for('bp_miembro.delete', id=item.id) }}" method="POST" onsubmit="return confirm('¿Deseas eliminar este miembro?');">
                                <button class="btn btn-outline-danger btn-sm" type="submit">Eliminar</button>
                            </form>
                        </div>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="3" class="text-center py-5 text-muted">No hay miembros registrados.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

{% endblock %}
