{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-8 col-xl-7">
        <div class="card page-card rounded-4">
            <div class="card-body p-4 p-md-5">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <p class="text-uppercase text-muted fw-semibold mb-1">Miembros</p>
                        <h1 class="h3 mb-0">Editar miembro</h1>
                    </div>
                    <a class="btn btn-outline-secondary" href="{{ url_for('bp_miembro.index') }}">Volver</a>
                </div>

                <form action="{{ url_for('bp_miembro.edit', id=miembro.id) }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label" for="nombre">Nombre</label>
                        <input class="form-control form-control-lg" type="text" id="nombre" name="nombre" value="{{ miembro.nombre }}" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label" for="email">Correo</label>
                        <input class="form-control form-control-lg" type="email" id="email" name="email" value="{{ miembro.email }}" required>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary btn-lg" type="submit">Actualizar</button>
                        <a class="btn btn-light btn-lg" href="{{ url_for('bp_miembro.index') }}">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
